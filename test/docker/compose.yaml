services:
  cronops:
    image: cronops-dev:local
    container_name: cronops-dev
    restart: unless-stopped
    volumes:
      - ../../build/test/docker/config:/config
      - ../../build/test/docker/logs:/data/logs
      - ../../build/test/docker/data:/io/source
      - ../../build/test/docker/data:/io/target
    ports:
      - 8228:8083
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Berlin
